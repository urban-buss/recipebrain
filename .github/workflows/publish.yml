name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install build
      - run: python .github/tools/sync-skills.py
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Pre-pull publish action image
        run: |
          for i in 1 2 3 4 5; do
            docker pull ghcr.io/pypa/gh-action-pypi-publish:release-v1 && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - uses: pypa/gh-action-pypi-publish@release/v1
